data:
  raw_path: data/raw
  processed_path: data/processed
  test_size: 0.2
  random_state: 42

features:
  text:
    max_features: 5000
    ngram_range: [1, 2]
  structured:
    categorical_cols: []
    numerical_cols: []

model:
  type: ridge
  params:
    alpha: 1.0
  output_path: models/model.joblib

api:
  host: 0.0.0.0
  port: 8000
